name: Deploy to GitHub Pages

# Publishes this static site to GitHub Pages on every push to main.
# Works when the `workwell-return` folder is the root of its own repo
# (see README → "Deploy to GitHub Pages").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # the whole site is static; nothing to build
      - id: deployment
        uses: actions/deploy-pages@v4
